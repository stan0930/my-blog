<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1540" role="img" aria-labelledby="title desc">
  <title id="title">二分查找红蓝染色法流程图</title>
  <desc id="desc">示例数组 nums = [2,4,6,8,10,12]，目标 target = 8。蓝色表示不满足 nums[i] >= 8，红色表示满足 nums[i] >= 8，展示 left、right 和 mid 的三轮移动过程。</desc>
  <style>
    text { font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace; }
    .title { font-size: 42px; font-weight: 800; fill: #0f172a; }
    .subtitle { font-size: 20px; font-weight: 500; fill: #475569; }
    .panel { fill: #ffffff; stroke: #dbe4ee; stroke-width: 2; }
    .panel-title { font-size: 28px; font-weight: 800; fill: #0f172a; }
    .panel-note { font-size: 20px; font-weight: 500; fill: #334155; }
    .small { font-size: 17px; font-weight: 500; fill: #64748b; }
    .legend { font-size: 18px; font-weight: 700; fill: #334155; }
    .idx { font-size: 15px; font-weight: 700; fill: #64748b; }
    .value { font-size: 24px; font-weight: 800; fill: #0f172a; }
    .value-small { font-size: 21px; font-weight: 800; fill: #0f172a; }
    .marker { font-size: 24px; font-weight: 900; fill: #0f172a; }
    .result { font-size: 24px; font-weight: 800; fill: #0f172a; }
    .line { stroke: #cbd5e1; stroke-width: 5; stroke-linecap: round; }
    .blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 4; }
    .red { fill: #fee2e2; stroke: #dc2626; stroke-width: 4; }
    .blue-text { fill: #1d4ed8; font-weight: 800; }
    .red-text { fill: #b91c1c; font-weight: 800; }
    .mid-ring { fill: none; stroke: #f59e0b; stroke-width: 7; }
    .arrow { stroke: #94a3b8; stroke-width: 3; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="1540" fill="#f8fafc"/>
  <rect x="28" y="28" width="1144" height="1484" rx="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="70" y="95" class="title">二分查找流程图：找第一个 &gt;= 8 的位置</text>
  <text x="70" y="132" class="subtitle">nums = [2, 4, 6, 8, 10, 12]，check(i) = nums[i] &gt;= 8，答案是“第一块红色”的下标</text>

  <rect x="70" y="160" width="1060" height="70" rx="16" fill="#f8fafc" stroke="#e2e8f0"/>
  <circle cx="118" cy="195" r="16" class="blue"/>
  <text x="145" y="202" class="legend">蓝色：不满足 `check(i)`，也就是 `nums[i] &lt; 8`</text>
  <circle cx="674" cy="195" r="16" class="red"/>
  <text x="701" y="202" class="legend">红色：满足 `check(i)`，也就是 `nums[i] &gt;= 8`</text>

  <g transform="translate(50,260)">
    <rect x="0" y="0" width="1100" height="270" rx="22" class="panel"/>
    <text x="35" y="48" class="panel-title">Step 0  初始化</text>
    <text x="35" y="84" class="panel-note mono">left = -1, right = n</text>
    <text x="35" y="116" class="panel-note">循环不变量：`left` 始终在蓝区，`right` 始终在红区</text>

    <g transform="translate(0,0)">
      <line x1="145" y1="160" x2="955" y2="160" class="line"/>
      <circle cx="105" cy="160" r="36" class="blue"/>
      <circle cx="225" cy="160" r="36" class="blue"/>
      <circle cx="345" cy="160" r="36" class="blue"/>
      <circle cx="465" cy="160" r="36" class="blue"/>
      <circle cx="585" cy="160" r="36" class="red"/>
      <circle cx="705" cy="160" r="36" class="red"/>
      <circle cx="825" cy="160" r="36" class="red"/>
      <circle cx="945" cy="160" r="36" class="red"/>

      <text x="86" y="167" class="value-small mono">-1</text>
      <text x="216" y="167" class="value mono">2</text>
      <text x="336" y="167" class="value mono">4</text>
      <text x="456" y="167" class="value mono">6</text>
      <text x="576" y="167" class="value mono">8</text>
      <text x="688" y="167" class="value mono">10</text>
      <text x="808" y="167" class="value mono">12</text>
      <text x="934" y="167" class="value-small mono">n</text>

      <text x="210" y="110" class="idx mono">idx 0</text>
      <text x="330" y="110" class="idx mono">idx 1</text>
      <text x="450" y="110" class="idx mono">idx 2</text>
      <text x="570" y="110" class="idx mono">idx 3</text>
      <text x="690" y="110" class="idx mono">idx 4</text>
      <text x="810" y="110" class="idx mono">idx 5</text>

      <text x="95" y="235" class="marker mono">L</text>
      <text x="936" y="235" class="marker mono">R</text>
    </g>
  </g>

  <g transform="translate(50,555)">
    <rect x="0" y="0" width="1100" height="270" rx="22" class="panel"/>
    <text x="35" y="48" class="panel-title">Step 1  第一次二分</text>
    <text x="35" y="84" class="panel-note mono">mid = (left + right) / 2 = (-1 + 6) / 2 = 2</text>
    <text x="35" y="116" class="panel-note mono">nums[2] = 6，属于 <tspan class="blue-text">蓝色</tspan>，所以更新 left = mid</text>

    <g transform="translate(0,0)">
      <line x1="145" y1="160" x2="955" y2="160" class="line"/>
      <circle cx="105" cy="160" r="36" class="blue"/>
      <circle cx="225" cy="160" r="36" class="blue"/>
      <circle cx="345" cy="160" r="36" class="blue"/>
      <circle cx="465" cy="160" r="36" class="blue"/>
      <circle cx="585" cy="160" r="36" class="red"/>
      <circle cx="705" cy="160" r="36" class="red"/>
      <circle cx="825" cy="160" r="36" class="red"/>
      <circle cx="945" cy="160" r="36" class="red"/>
      <circle cx="465" cy="160" r="46" class="mid-ring"/>

      <text x="86" y="167" class="value-small mono">-1</text>
      <text x="216" y="167" class="value mono">2</text>
      <text x="336" y="167" class="value mono">4</text>
      <text x="456" y="167" class="value mono">6</text>
      <text x="576" y="167" class="value mono">8</text>
      <text x="688" y="167" class="value mono">10</text>
      <text x="808" y="167" class="value mono">12</text>
      <text x="934" y="167" class="value-small mono">n</text>

      <text x="450" y="110" class="idx mono">idx 2</text>
      <line x1="465" y1="118" x2="465" y2="130" class="arrow"/>

      <text x="455" y="235" class="marker mono">L</text>
      <text x="459" y="264" class="small mono">M</text>
      <text x="936" y="235" class="marker mono">R</text>
    </g>
  </g>

  <g transform="translate(50,850)">
    <rect x="0" y="0" width="1100" height="270" rx="22" class="panel"/>
    <text x="35" y="48" class="panel-title">Step 2  第二次二分</text>
    <text x="35" y="84" class="panel-note mono">mid = (2 + 6) / 2 = 4</text>
    <text x="35" y="116" class="panel-note mono">nums[4] = 10，属于 <tspan class="red-text">红色</tspan>，所以更新 right = mid</text>

    <g transform="translate(0,0)">
      <line x1="145" y1="160" x2="955" y2="160" class="line"/>
      <circle cx="105" cy="160" r="36" class="blue"/>
      <circle cx="225" cy="160" r="36" class="blue"/>
      <circle cx="345" cy="160" r="36" class="blue"/>
      <circle cx="465" cy="160" r="36" class="blue"/>
      <circle cx="585" cy="160" r="36" class="red"/>
      <circle cx="705" cy="160" r="36" class="red"/>
      <circle cx="825" cy="160" r="36" class="red"/>
      <circle cx="945" cy="160" r="36" class="red"/>
      <circle cx="705" cy="160" r="46" class="mid-ring"/>

      <text x="86" y="167" class="value-small mono">-1</text>
      <text x="216" y="167" class="value mono">2</text>
      <text x="336" y="167" class="value mono">4</text>
      <text x="456" y="167" class="value mono">6</text>
      <text x="576" y="167" class="value mono">8</text>
      <text x="688" y="167" class="value mono">10</text>
      <text x="808" y="167" class="value mono">12</text>
      <text x="934" y="167" class="value-small mono">n</text>

      <text x="690" y="110" class="idx mono">idx 4</text>
      <line x1="705" y1="118" x2="705" y2="130" class="arrow"/>

      <text x="455" y="235" class="marker mono">L</text>
      <text x="699" y="264" class="small mono">M</text>
      <text x="696" y="235" class="marker mono">R</text>
    </g>
  </g>

  <g transform="translate(50,1145)">
    <rect x="0" y="0" width="1100" height="315" rx="22" class="panel"/>
    <text x="35" y="48" class="panel-title">Step 3  第三次二分并结束</text>
    <text x="35" y="84" class="panel-note mono">mid = (2 + 4) / 2 = 3</text>
    <text x="35" y="116" class="panel-note mono">nums[3] = 8，属于 <tspan class="red-text">红色</tspan>，所以更新 right = 3</text>

    <g transform="translate(0,0)">
      <line x1="145" y1="170" x2="955" y2="170" class="line"/>
      <circle cx="105" cy="170" r="36" class="blue"/>
      <circle cx="225" cy="170" r="36" class="blue"/>
      <circle cx="345" cy="170" r="36" class="blue"/>
      <circle cx="465" cy="170" r="36" class="blue"/>
      <circle cx="585" cy="170" r="36" class="red"/>
      <circle cx="705" cy="170" r="36" class="red"/>
      <circle cx="825" cy="170" r="36" class="red"/>
      <circle cx="945" cy="170" r="36" class="red"/>
      <circle cx="585" cy="170" r="46" class="mid-ring"/>

      <text x="86" y="177" class="value-small mono">-1</text>
      <text x="216" y="177" class="value mono">2</text>
      <text x="336" y="177" class="value mono">4</text>
      <text x="456" y="177" class="value mono">6</text>
      <text x="576" y="177" class="value mono">8</text>
      <text x="688" y="177" class="value mono">10</text>
      <text x="808" y="177" class="value mono">12</text>
      <text x="934" y="177" class="value-small mono">n</text>

      <text x="570" y="120" class="idx mono">idx 3</text>
      <line x1="585" y1="128" x2="585" y2="140" class="arrow"/>

      <text x="455" y="245" class="marker mono">L</text>
      <text x="579" y="274" class="small mono">M</text>
      <text x="576" y="245" class="marker mono">R</text>
    </g>

    <text x="35" y="285" class="result">此时满足 <tspan class="mono">left + 1 == right</tspan>，停止。答案就是第一个红点：<tspan class="mono">index = 3</tspan>，也就是 <tspan class="mono">nums[3] = 8</tspan>。</text>
  </g>
</svg>
