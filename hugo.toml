baseURL = 'https://stan0930.github.io/'
languageCode = 'zh-cn'
title = "Stan's Blog"
theme = "PaperMod"

[pagination]
  pagerSize = 8

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  DateFormat = "2006-01-02"
  author = "Stan"
  description = "记录编程、算法和 Linux 学习"
  keywords = ["Blog", "C++", "Algorithm", "Linux", "Hugo"]

  [params.homeInfoParams]
    Title = "Stan 的技术小站"
    Content = "记录我在 C++、算法和 Linux 上的学习与实践。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/stan0930"

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 30

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 40

[markup]
  [markup.highlight]
    noClasses = false
    style = "github"
    lineNos = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
